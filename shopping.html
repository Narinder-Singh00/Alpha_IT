<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Shopping Cart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .search-box {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .products, .cart {
            width: 50%;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
        }

        .product-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .product-card.expensive {
            border-left: 5px solid red;
            background: #fff3f3;
        }

        .product-card button {
            margin-top: 10px;
            padding: 8px 12px;
            background: #007bff;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .product-card button:hover {
            background: #0056b3;
        }

        .cart-item {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }

        .cart-item button {
            margin: 0 5px;
            padding: 5px 10px;
        }

        .total {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Interactive Shopping Cart</h1>

<input type="text" class="search-box" placeholder="Search products..." oninput="filterProducts(this.value)">

<div class="container">
    <div class="products">
        <h2>Products</h2>
        <div id="productList"></div>
    </div>

    <div class="cart">
        <h2>Cart</h2>
        <div id="cartItems"></div>
        <div class="total" id="cartTotal"></div>
    </div>
</div>

<script>
    const products = [
        { id: 1, name: "Mobile Phone", price: 15000 },
        { id: 2, name: "Laptop", price: 55000 },
        { id: 3, name: "Headphones", price: 900 },
        { id: 4, name: "Smart Watch", price: 1200 }
    ];

    let cart = [];

    function renderProducts(list) {
        const productList = document.getElementById("productList");
        productList.innerHTML = "";

        list.forEach(product => {
            const expensiveClass = product.price > 1000 ? "expensive" : "";
            productList.innerHTML += `
                <div class="product-card ${expensiveClass}">
                    <h3>${product.name}</h3>
                    <p>Price: ₹${product.price}</p>
                    <button onclick="addToCart(${product.id})">Add to Cart</button>
                </div>
            `;
        });
    }

    function addToCart(id) {
        const item = cart.find(p => p.id === id);
        if (item) {
            item.quantity++;
        } else {
            const product = products.find(p => p.id === id);
            cart.push({ ...product, quantity: 1 });
        }
        renderCart();
    }

    function removeFromCart(id) {
        cart = cart.filter(item => item.id !== id);
        renderCart();
    }

    function updateQuantity(id, action) {
        const item = cart.find(p => p.id === id);
        if (action === "increase") {
            item.quantity++;
        } else if (action === "decrease") {
            item.quantity--;
            if (item.quantity === 0) {
                removeFromCart(id);
                return;
            }
        }
        renderCart();
    }

    function calculateTotal() {
        let totalItems = 0;
        let totalPrice = 0;

        cart.forEach(item => {
            totalItems += item.quantity;
            totalPrice += item.price * item.quantity;
        });

        document.getElementById("cartTotal").innerHTML =
            `Total Items: ${totalItems} <br> Total Price: ₹${totalPrice}`;
    }

    function renderCart() {
        const cartItems = document.getElementById("cartItems");
        cartItems.innerHTML = "";

        cart.forEach(item => {
            cartItems.innerHTML += `
                <div class="cart-item">
                    <strong>${item.name}</strong><br>
                    Price: ₹${item.price} <br>
                    Quantity: 
                    <button onclick="updateQuantity(${item.id}, 'decrease')">-</button>
                    ${item.quantity}
                    <button onclick="updateQuantity(${item.id}, 'increase')">+</button>
                    <br>
                    Subtotal: ₹${item.price * item.quantity}
                    <br>
                    <button onclick="removeFromCart(${item.id})">Remove</button>
                </div>
            `;
        });

        calculateTotal();
    }

    function filterProducts(text) {
        const filtered = products.filter(product =>
            product.name.toLowerCase().includes(text.toLowerCase())
        );
        renderProducts(filtered);
    }

    renderProducts(products);
</script>

</body>
</html>
