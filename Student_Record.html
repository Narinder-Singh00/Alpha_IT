<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Record Processing System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            color: white;
            text-align: center;
            padding: 40px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .output {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            width: 60%;
            margin: auto;
            text-align: left;
        }
    </style>
</head>
<body>

<h1>Student Record Processing System</h1>
<div class="output" id="output"></div>

<script>

    // Students Object
    const students = {
        student1: {
            name: "Alice",
            marks: { math: 85, science: 90, english: 78 }
        },
        student2: {
            name: "Bob",
            marks: { math: 75, science: 80, english: 88 }
        },
        student3: {
            name: "Charlie",
            marks: { math: 95, science: 89, english: 92 }
        },
        student4: {
            name: "David"
            // Missing marks intentionally (to trigger error)
        }
    };

    const outputDiv = document.getElementById("output");

    // Asynchronous function to process a single student
    async function processStudent(student) {
        return new Promise((resolve, reject) => {

            const delay = Math.floor(Math.random() * 2000) + 1000;

            setTimeout(() => {

                try {
                    if (!student.marks) {
                        throw new Error("Marks data missing!");
                    }

                    let total = 0;
                    let count = 0;

                    for (let subject in student.marks) {
                        total += student.marks[subject];
                        count++;
                    }

                    const average = total / count;

                    resolve({
                        name: student.name,
                        average: average
                    });

                } catch (error) {
                    reject(error);
                }

            }, delay);

        });
    }

    // Process all students sequentially
    async function processAllStudents() {

        const results = [];

        for (let key in students) {

            const student = students[key];

            console.log(`Processing student: ${student.name}...`);
            outputDiv.innerHTML += `<p>Processing student: ${student.name}...</p>`;

            try {
                const result = await processStudent(student);
                results.push(result);
            } catch (error) {
                console.error(`Error processing ${student.name}: ${error.message}`);
                outputDiv.innerHTML += `<p style="color:yellow;">Error processing ${student.name}: ${error.message}</p>`;
            }
        }

        outputDiv.innerHTML += "<hr>";

        // Display results using for...of loop
        for (let result of results) {

            const status = result.average >= 80 ? "Pass" : "Fail";

            const message = `${result.name} has an average of ${result.average.toFixed(2)} (${status})`;

            console.log(message);
            outputDiv.innerHTML += `<p>${message}</p>`;
        }
    }

    // Run the system
    processAllStudents();

</script>

</body>
</html>
